<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню — Fabrista</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="header__inner">
                <a href="#" class="header__logo">
                    <img src="https://static.tildacdn.com/tild3836-6261-4130-a465-656331646636/photo.svg" alt="Fabrista" class="header__logo-img">
                    <span class="header__logo-text"></span>
                </a>
                <p class="header__subtitle">меню</p>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="menu">
                <div class="menu__tabs"></div>

                <div class="menu__content menu__content--active" id="tab-bar"></div>
                <div class="menu__content" id="tab-kitchen"></div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer__inner">
                <p class="footer__text">Fabrista &mdash; сеть кофеен с мировыми амбициями</p>
            </div>
        </div>
    </footer>

    <!-- Модальное окно товара -->
    <div class="modal-overlay" id="item-modal">
        <div class="modal-card">
            <button class="modal-close" aria-label="Закрыть">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <img class="modal-image" src="" alt="">
            <div class="modal-body">
                <h2 class="modal-title"></h2>
                <span class="modal-price"></span>
                <div class="modal-sizes"></div>
                <p class="modal-desc"></p>
            </div>
        </div>
    </div>

    <!-- Корзина -->
    <button class="cart-fab" id="cart-fab" aria-label="Корзина">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 6h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 10a4 4 0 01-8 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="cart-fab__badge" id="cart-badge">0</span>
    </button>

    <!-- Модалка корзины -->
    <div class="modal-overlay" id="cart-modal">
        <div class="modal-card cart-modal-card">
            <div class="cart-modal-head">
                <h2 class="cart-modal-title">Корзина</h2>
                <button class="modal-close" id="cart-modal-close" aria-label="Закрыть корзину">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="cart-modal-body" id="cart-modal-body">
                <p class="cart-modal-empty">Корзина пуста</p>
            </div>
            <div class="cart-modal-checkout" id="cart-modal-checkout" style="display:none">
                <div class="checkout-field">
                    <label class="checkout-label" for="checkout-name">Имя <span class="required-star">*</span></label>
                    <input type="text" id="checkout-name" class="checkout-input" placeholder="Как к вам обращаться?" required autocomplete="name">
                    <span class="checkout-error-msg" id="checkout-name-err">Пожалуйста, укажите ваше имя</span>
                </div>
                <div class="checkout-field">
                    <label class="checkout-label" for="checkout-comment">Комментарий к заказу</label>
                    <textarea id="checkout-comment" class="checkout-textarea" placeholder="Пожелания по составу, аллергии, впечатления..." rows="2"></textarea>
                </div>
            </div>
            <div class="cart-modal-footer" id="cart-modal-footer" style="display:none">
                <div class="cart-modal-total-row">
                    <span class="cart-modal-total-label">Итого</span>
                    <span class="cart-modal-total-price" id="cart-modal-total">0₽</span>
                </div>
                <button class="cart-checkout-btn" id="cart-checkout-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Оформить заказ
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
